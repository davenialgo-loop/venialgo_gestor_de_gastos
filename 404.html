<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Venialgo Gestor de Gastos</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e8e8e8;
            padding: 1rem;
        }
        .container {
            text-align: center;
            max-width: 480px;
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        h1 { font-size: 5rem; color: #4CAF50; margin-bottom: 0.5rem; }
        h2 { font-size: 1.5rem; color: #e8e8e8; margin-bottom: 1rem; }
        p { color: #aaaaaa; margin-bottom: 2rem; line-height: 1.6; }
        a {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        a:hover { background: #388E3C; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔍</div>
        <h1>404</h1>
        <h2>Página no encontrada</h2>
        <p>La página que buscas no existe o fue movida.</p>
        <a href="./">Volver al Gestor de Gastos</a>
    </div>
</body>
</html>
